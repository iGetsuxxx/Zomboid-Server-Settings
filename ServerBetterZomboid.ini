# Lista de comandos separados por ponto e vírgula que năo serăo gravados no log do servidor cmd.txt. Por exemplo: \n-veículo. Inserir * significa NĂO escrever nenhum comando de veículo. Inserindo: \n+vehicle.installPart significa que ESCREVA esse comando
ClientCommandFilter=-vehicle.*;+vehicle.damageWindow;+vehicle.fixPart;+vehicle.installPart;+vehicle.uninstallPart

# Lista de açőes separadas por ponto e vírgula que serăo gravadas no log do servidor ClientActionLogs.txt
ClientActionLogs=ISEnterVehicle;ISExitVehicle;ISTakeEngineParts;

# Acompanha as alteraçőes nos níveis de vantagens do jogador no log do servidor PerkLog.txt
PerkLogs=true

# Número máximo de itens que podem ser colocados em um recipiente. Zero significa que năo há limite. (OBSERVAÇĂO: Isso inclui itens pequenos individuais, como pregos. Um limite de 50 significa que apenas 50 pregos podem ser armazenados.)\nMínimo = 0 Máximo = 9000 Padrăo = 0
ItemNumbersLimitPerContainer=0

# Número de dias antes que os respingos de sangue antigos sejam removidos.
# A remoçăo acontece quando partes do mapa săo carregados.
# Zero significa que eles nunca desaparecerăo\nMínimo = 0 Máximo = 365 Padrăo = 0
BloodSplatLifespanDays=0

# Permite o uso de caracteres năo ASCII (cirílico etc) em nomes de usuário
AllowNonAsciiUsername=false

BanKickGlobalSound=true

# Se ativado, quando o HoursForCorpseRemoval for acionado, ele também removerá os cadáveres do jogador do chăo
RemovePlayerCorpsesOnCorpseRemoval=false

# Se verdadeiro, o jogador pode usar o botăo "excluir tudo" nas caixas
TrashDeleteAll=false

# Se verdadeiro, o jogador pode bater novamente quando atingido por outro jogador
PVPMeleeWhileHitReaction=false

# Se verdadeiro, os jogadores terăo que passar o mouse sobre alguém para ver seu nome de exibiçăo
MouseOverToSeeDisplayName=true

# Se verdadeiro, omite automaticamente o jogador que vocę năo pode ver (como zumbis)
HidePlayersBehindYou=true

# Adiciona dano para ataques corpo a corpo PVP\nMínimo = 0,00 Máximo = 500,00 Padrăo = 30,00
PVPMeleeDamageModifier=1.0

# Adiciona dano para ataques ŕ distância PVP\nMínimo = 0,00 Máximo = 500,00 Padrăo = 50,00
PVPFirearmDamageModifier=1.5

# Modifica o alcance da atraçăo de zumbis para carros (valores mais baixos podem ajudar com lags)\nMínimo = 0,00 Máximo = 10,00 Padrăo = 0,50
CarEngineAttractionModifier=0.5

# Controla se os jogadores esbarram (e derrubam) outros jogadores ao passar por eles.
PlayerBumpPlayer=true

# Controla a exibiçăo de jogadores remotos no mapa do jogo.\n1 = Oculto 2 = Amigos 3 = Todos\nMínimo = 1 Máximo = 3 Padrăo = 1
MapRemotePlayerVisibility=1

# Mínimo = 1 Máximo = 300 Padrăo = 5
BackupsCount=5

BackupsOnStart=true

BackupsOnVersionChange=true

# Mínimo = 0 Máximo = 1500 Padrăo = 0
BackupsPeriod=0

