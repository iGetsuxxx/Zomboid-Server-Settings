# Expulsa jogadores em que os arquivos do jogo năo correspondem com os do servidor
DoLuaChecksum=true

DenyLoginOnOverloadedServer=true

# Mostra o servidor no navegador do jogo. (Nota: os servidores habilitados para Steam estăo sempre visíveis no navegador do servidor Steam)
Public=false

# Nome do servidor exibido no navegador do jogo e, se aplicável, no navegador Steam
PublicName=[NOME DO SERVIDOR]

# Descriçăo exibida no navegador do servidor público do jogo. Digitar \n criará uma nova linha na sua descriçăo
PublicDescription=

# Número máximo de jogadores que podem estar no servidor ao mesmo tempo. Isso exclui os administradores.
# AVISO: a contagem de jogadores do servidor acima de 32 resultará potencialmente, de forma negativa, no fluxo e dessincronizaçăo de mapas. Por favor, avance com cuidado.\nMínimo = 1 Máximo = 100 Padrăo = 32
MaxPlayers=8

# Limite de ping, em milissegundos, antes que um jogador seja expulso do servidor. (Definir como 100 para desabilitar)\nMínimo = 100 Máximo = 2147483647 Padrăo = 400
PingLimit=400

# Após X horas, todos os recipientes do mundo irăo reaparecer. Para gerar loot, um recipiente deve ter sido looteado pelo menos uma vez. O reaparecimento de loot năo é afetado pela visibilidade ou loots subsequentes.\nMínimo = 0 Máximo = 2147483647 Padrăo = 0
HoursForLootRespawn=0

# Recipientes com um número de itens maior ou igual a essa configuraçăo năo reaparecerăo\nMínimo = 1 Máximo = 2147483647 Padrăo = 4
MaxItemsForLootRespawn=4

# Itens năo reaparecerăo em construçőes que os jogadores tenham barricado ou construído
ConstructionPreventsLootRespawn=true

# Remove as contas de jogadores da lista de permissőes após a morte. Isso impede que os jogadores criem um novo personagem após a morte em servidores Open=false
DropOffWhiteListAfterDeath=false

# Todas as formas de fogo săo desativadas - exceto fogueiras
NoFire=false

# Se marcado, toda vez que um jogador morrer, uma mensagem global será exibida no chat
AnnounceDeath=false

# Número de minutos no jogo que leva para ler uma página de um livro\nMínimo = 0,00 Máximo = 60,00 Padrăo = 1,00
MinutesPerPage=0.4

# As partes carregadas do mapa săo salvas após esse número definido de minutos do mundo real. (O mapa geralmente é salvo somente depois que os jogadores saem de uma área carregada)\nMínimo = 0 Máximo = 2147483647 Padrăo = 0
SaveWorldEveryMinutes=0

# Tanto administradores quanto jogadores podem reivindicar bases
PlayerSafehouse=true

# Apenas administradores podem reivindicar bases
AdminSafehouse=false

# Permite que năo membros entrem em uma base sem serem convidados
SafehouseAllowTrepass=true

# Permite que o fogo danifique bases
SafehouseAllowFire=true

# Permite que năo membros peguem itens de bases
SafehouseAllowLoot=true

# Os jogadores văo reaparecer em uma base do qual eram membros antes de morrer
SafehouseAllowRespawn=false

# Os jogadores devem ter sobrevivido a esse número de dias no jogo antes de poderem reivindicar uma base\nMínimo = 0 Máximo = 2147483647 Padrăo = 0
SafehouseDaySurvivedToClaim=0

# Os jogadores săo removidos automaticamente de uma base que năo visitaram por tantas horas do mundo real\nMínimo = 0 Máximo = 2147483647 Padrăo = 144
SafeHouseRemovalTime=144

# Controla se os jogadores podem reivindicar edifícios năo residenciais.
SafehouseAllowNonResidential=false

# Permite que os jogadores destruam objetos do mundo com marretas
AllowDestructionBySledgehammer=true

# Permite que os jogadores destruam objetos do mundo apenas em sua base (exigir que AllowDestructionBySledgehammer seja verdadeiro).
