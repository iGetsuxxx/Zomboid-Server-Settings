# Expulsa jogadores que parecem estar se movendo mais rápido do que é possível. Pode ser bug - use com cuidado.
KickFastPlayers=false

# ServerPlayerID determina se um personagem é de outro servidor ou single player. Este valor pode ser alterado por soft resets. Se este número corresponder ao jogador, o jogador deve criar um novo personagem. Isso é usado em conjunto com ResetID. É altamente recomendável que vocę faça backup desses IDs em algum lugar
